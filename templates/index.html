<!DOCTYPE html><html lang="en"><head>    <meta charset="UTF-8">    <title>Dice Roller</title>    <style>        :root {            --card-bg: rgba(15, 23, 42, 0.8);             --accent: #38bdf8;            --accent-glow: rgba(56, 189, 248, 0.5);            --text: #f8fafc;            --reroll-amber: #f59e0b;        }        body {             font-family: 'Segoe UI', 'Georgia', serif;             background: linear-gradient(rgba(15, 23, 42, 0.7), rgba(15, 23, 42, 0.7)),                         url('https://plus.unsplash.com/premium_photo-1718864916008-0fd0d813d36d?w=800&auto=format&fit=crop&q=60');            background-size: cover;            background-position: center;            background-attachment: fixed;            display: flex;             justify-content: center;             align-items: center;             min-height: 100vh;             margin: 0;             color: var(--text);        }        .card {             background: var(--card-bg);             backdrop-filter: blur(20px);            padding: 2.5rem;             border-radius: 30px;             text-align: center;             width: 450px;            border: 1px solid rgba(255, 255, 255, 0.1);            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);        }        h1 { font-size: 2rem; margin-bottom: 1.5rem; }        input[type="text"] {             width: 80%;             padding: 12px;             background: rgba(0,0,0,0.3);            border: 2px solid rgba(255,255,255,0.1);            border-radius: 12px;             color: white;            font-size: 1.1rem;            text-align: center;            margin-bottom: 15px;        }        button {             cursor: pointer;            transition: all 0.2s;            border: none;            font-weight: bold;        }        .main-btn {            background: var(--accent);            color: #0f172a;            padding: 12px 30px;            border-radius: 12px;            text-transform: uppercase;        }        .reroll-btn {            background: var(--reroll-amber);            color: white;            padding: 12px 25px;            border-radius: 12px;            margin-top: 20px;            box-shadow: 0 4px 15px rgba(245, 158, 11, 0.4);        }        .reroll-btn:hover { transform: scale(1.05); background: #fbbf24; }        /* --- DICE TRAY --- */        .dice-tray {            display: flex;            flex-wrap: wrap;            justify-content: center;            gap: 5px;            margin: 20px 0;        }/* This scales the "OUTCOME" label */.result-label {    font-size: 1.8rem;      /* Increased from 0.9rem */    font-weight: 700;    letter-spacing: 3px;    /* Makes it look more 'header-like' */    margin-bottom: 0.5rem;    color: var(--accent);}/* This ensures the big number stays massive and centered */.result-value {     font-size: 6rem;        /* Increased from 4.5rem */    font-weight: 900;     color: #fff;    line-height: 1.1;    text-shadow: 0 0 40px var(--accent-glow);}        /* Base die style with Glass Effect */.die-result {    position: relative;    background: rgba(15, 23, 42, 0.8);     backdrop-filter: blur(8px);    -webkit-backdrop-filter: blur(8px);        /* Blue Numbers */    color: var(--accent);    text-shadow: 0 0 8px var(--accent-glow);        width: 60px;     height: 60px;     display: flex;    align-items: center;    justify-content: center;    font-weight: 900;    font-size: 1.3rem;    margin: 15px;    z-index: 1;}/* This creates the "Outer Glow" for ALL shapes */.die-result::before {    content: "";    position: absolute;    top: 0; left: 0; right: 0; bottom: 0;    background: var(--accent);    /* This makes the glow spread out from behind the shape */    filter: blur(10px);    opacity: 0.4;    z-index: -1;    /* This ensures the glow matches the shape of the parent */    clip-path: inherit;}/* The Glass Shine Layer */.die-result::after {    content: "";    position: absolute;    top: 0; left: 0; right: 0; bottom: 0;    background: linear-gradient(135deg, rgba(255,255,255,0.2) 0%, rgba(255,255,255,0) 50%);    z-index: 2;    pointer-events: none;    clip-path: inherit; /* Matches the parent shape */}/* Fix shape geometry for better centering */.shape-triangle { clip-path: polygon(50% 12%, 100% 86.6%, 0% 86.6%); padding-top: 12px; }.shape-pentagon { clip-path: polygon(50% 0%, 100% 38%, 82% 100%, 18% 100%, 0% 38%); }.shape-circle   { clip-path: circle(50%); }.shape-point    { clip-path: polygon(50% 0%, 100% 80%, 50% 100%, 0% 80%); }.shape-square   { border-radius: 8px; clip-path: inset(0 0 0 0); }/* Crit/Fumble with deeper "glass" color */.crit {    color: #ffd700 !important; /* Gold text */    text-shadow: 0 0 15px #ffae00;}.crit::before {    background: #ffd700 !important;    opacity: 0.7 !important;    filter: blur(12px) !important;}/* Fumble - Red */.fumble {    color: #ff4d4d !important; /* Red text */    text-shadow: 0 0 15px #ff0000;}.fumble::before {    background: #ff0000 !important;    opacity: 0.7 !important;    filter: blur(12px) !important;}    </style></head><body>    <div class="card">        <h1>🎲 Dice Roller</h1>                <form method="POST">            <div class="input-group">                <input type="text" name="roll" placeholder="e.g. 2d20+5" value="{{ roll_query }}" autocomplete="off">            </div>                        <button type="submit" name="action" value="roll" class="main-btn">Execute Roll</button>            {% if rolls_list %}                <div class="dice-tray">                    {% for i in range(rolls_list|length) %}                        <span class="die-result                             {% if dice_list[i] in [4, 8, 20] %} shape-triangle                            {% elif dice_list[i] == 12 %} shape-pentagon                            {% elif dice_list[i] in [2, 100] %} shape-circle                            {% elif dice_list[i] == 10 %} shape-point                            {% else %} shape-square {% endif %}"                            data-final="{{ rolls_list[i] }}"                             data-sides="{{ dice_list[i] }}"                            data-reroll="{{ 'true' if rerolled_indices is not defined or i in rerolled_indices else 'false' }}">                            <span class="tumble-val">0</span>                        </span>                    {% endfor %}                </div>                <input type="hidden" name="current_total" value="{{ result }}">                {% for val in rolls_list %}<input type="hidden" name="current_rolls" value="{{ val }}">{% endfor %}                {% for die in dice_list %}<input type="hidden" name="current_dice" value="{{ die }}">{% endfor %}                                <button type="submit" name="action" value="reroll" class="reroll-btn">                    Reroll Ones 🎲                </button>            {% endif %}            {% if result is not none and result != 'Invalid Format!' %}                <div class="result-container">                    <div class="result-label">Outcome</div>                    <div class="result-value">{{ result }}</div>                </div>            {% endif %}        </form>    </div>    <script>    document.querySelectorAll('.die-result').forEach(die => {        const display = die.querySelector('.tumble-val');        const finalValue = parseInt(die.getAttribute('data-final'));        const sides = parseInt(die.getAttribute('data-sides')) || 20;                // This is the "gatekeeper" - it checks if Python said this die changed        const shouldAnimate = die.getAttribute('data-reroll') === 'true';        if (finalValue === sides && sides > 1) {die.classList.add('crit');        }        if (!shouldAnimate) { display.innerText = finalValue; return; }        // IF THE DIE IS NOT REROLLED:         // We set the number, check for colors, and STOP IMMEDIATELY.        if (!shouldAnimate) {            display.innerText = finalValue;            if (finalValue === sides && sides > 1) die.classList.add('crit');            else if (finalValue === 1) die.classList.add('fumble');            return; // <--- THIS STOP SIGN IS CRITICAL        }        // IF THE DIE IS REROLLED: Run the tumble animation        let counter = 0;        const maxTicks = 15;         const roller = setInterval(() => {            display.innerText = Math.floor(Math.random() * sides) + 1;            counter++;            if (counter >= maxTicks) {                clearInterval(roller);                display.innerText = finalValue;                if (finalValue === sides && sides > 1) die.classList.add('crit');                else if (finalValue === 1) die.classList.add('fumble');                                die.style.transform = "scale(1.1)";                setTimeout(() => die.style.transform = "scale(1)", 150);            }        }, 40);     });</script></body></html>
