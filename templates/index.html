<!DOCTYPE html><html><head>    <title>Dice Roller</title>    <style>        :root {            --card-bg: rgba(15, 23, 42, 0.7);             --accent: #38bdf8;            --accent-glow: rgba(56, 189, 248, 0.5);            --text: #f8fafc;        }        body {             font-family: 'Georgia', serif;             background: linear-gradient(rgba(15, 23, 42, 0.6), rgba(15, 23, 42, 0.6)),                         url('https://plus.unsplash.com/premium_photo-1718864916008-0fd0d813d36d?w=800&auto=format&fit=crop&q=60');            background-size: cover;            background-position: center;            background-attachment: fixed;            display: flex;             justify-content: center;             align-items: center;             height: 100vh;             margin: 0;         }        .card {             background: var(--card-bg);             backdrop-filter: blur(20px);            -webkit-backdrop-filter: blur(20px);            padding: 3.5rem;             border-radius: 40px;             text-align: center;             width: 420px;            border: 1px solid rgba(255, 255, 255, 0.1);            box-shadow:                 0 25px 50px -12px rgba(0, 0, 0, 0.5),                0 0 20px rgba(56, 189, 248, 0.1);            transition: transform 0.3s ease;        }        .card:hover {            transform: translateY(-5px);            border-color: rgba(56, 189, 248, 0.4);        }        h1 {             font-weight: 800;             font-size: 2rem;            letter-spacing: -1px;             margin-bottom: 2.5rem;             color: var(--text);            text-shadow: 0 2px 10px rgba(0,0,0,0.3);        }        .input-group {            position: relative;            margin-bottom: 2rem;        }        input {             width: 85%;             padding: 16px;             background: rgba(15, 23, 42, 0.8);            border: 2px solid rgba(255, 255, 255, 0.05);            border-radius: 16px;             color: white;            font-size: 1.2rem;            text-align: center;            transition: all 0.3s ease;        }        input:focus {             outline: none;             border-color: var(--accent);            background: rgba(15, 23, 42, 1);            box-shadow: 0 0 15px var(--accent-glow);        }        button {             background: var(--accent);             color: #0f172a;             font-weight: 800;            text-transform: uppercase;            letter-spacing: 1px;            padding: 16px 40px;             border: none;             border-radius: 16px;             cursor: pointer;             font-size: 1rem;            transition: all 0.2s ease;            box-shadow: 0 4px 15px var(--accent-glow);        }        button:hover {             transform: scale(1.05);            background-color: #7dd3fc;            box-shadow: 0 8px 25px var(--accent-glow);        }        /* --- NEW: DICE TRAY STYLING --- */        .dice-tray {            display: flex;            flex-wrap: wrap;            justify-content: center;            gap: 10px;            margin-top: 2rem;            margin-bottom: 1rem;        }        .die-result {            background: rgba(255, 255, 255, 0.05);            border: 1px solid var(--accent);            color: var(--accent);            padding: 6px 12px;            border-radius: 10px;            font-weight: bold;            font-size: 1.1rem;            box-shadow: 0 0 10px rgba(56, 189, 248, 0.2);            /* Smooth pop-in animation */            animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);        }        @keyframes popIn {            0% { transform: scale(0); opacity: 0; }            100% { transform: scale(1); opacity: 1; }        }        /* ----------------------------- */        .result-container {            margin-top: 1rem;            padding-top: 1.5rem;            border-top: 1px solid rgba(255, 255, 255, 0.1);        }        .result-label {            font-size: 0.9rem;            text-transform: uppercase;            letter-spacing: 2px;            color: var(--accent);            margin-bottom: 0.5rem;        }        .result-value {             font-size: 4.5rem;             font-weight: 900;             color: #fff;            line-height: 1;            text-shadow: 0 0 30px var(--accent-glow);        }    </style></head><body>    <div class="card">        <h1>🎲 Dice Roller</h1>        <form method="POST">            <div class="input-group">                <input type="text" name="roll" placeholder="e.g. 2d6+4" value="{{ roll_query }}" autocomplete="off">            </div>            <button type="submit">Execute Roll</button>        </form>        {% if rolls_list %}            <div class="dice-tray">                {% for die in rolls_list %}                    <span class="die-result">{{ die }}</span>                {% endfor %}            </div>        {% endif %}        {% if result is not none %}            <div class="result-container">                <div class="result-label">Outcome</div>                <div class="result-value">{{ result }}</div>            </div>        {% endif %}    </div></body></html>
