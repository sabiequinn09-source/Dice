<!DOCTYPE html><html><head>    <title>Dice Roller</title>    <style>        :root {            --card-bg: rgba(15, 23, 42, 0.7);             --accent: #38bdf8;            --accent-glow: rgba(56, 189, 248, 0.5);            --text: #f8fafc;        }        body {             font-family: 'Georgia', serif;             background: linear-gradient(rgba(15, 23, 42, 0.6), rgba(15, 23, 42, 0.6)),                         url('https://plus.unsplash.com/premium_photo-1718864916008-0fd0d813d36d?w=800&auto=format&fit=crop&q=60');            background-size: cover;            background-position: center;            background-attachment: fixed;            display: flex;             justify-content: center;             align-items: center;             min-height: 100vh;             margin: 0;         }        .card {             background: var(--card-bg);             backdrop-filter: blur(20px);            -webkit-backdrop-filter: blur(20px);            padding: 3.5rem;             border-radius: 40px;             text-align: center;             width: 420px;            border: 1px solid rgba(255, 255, 255, 0.1);            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5), 0 0 20px rgba(56, 189, 248, 0.1);        }        h1 { font-weight: 800; font-size: 2rem; color: var(--text); margin-bottom: 2.5rem; }        input { width: 85%; padding: 16px; background: rgba(15, 23, 42, 0.8); border: 2px solid rgba(255, 255, 255, 0.05); border-radius: 16px; color: white; font-size: 1.2rem; text-align: center; margin-bottom: 1rem; }        button { background: var(--accent); color: #0f172a; font-weight: 800; padding: 16px 40px; border: none; border-radius: 16px; cursor: pointer; transition: 0.2s; }                .dice-tray { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; margin: 2rem 0; }                .die-result {            position: relative; background: rgba(15, 23, 42, 0.8); color: var(--accent);            width: 60px; height: 60px; display: flex; align-items: center; justify-content: center;            font-weight: 900; font-size: 1.3rem; margin: 15px; z-index: 1;        }        .die-result::before {            content: ""; position: absolute; top: 0; left: 0; right: 0; bottom: 0;            background: var(--accent); filter: blur(10px); opacity: 0.4; z-index: -1; clip-path: inherit;        }        /* SHAPES */        .shape-triangle { clip-path: polygon(50% 12%, 100% 86.6%, 0% 86.6%); padding-top: 10px; }        .shape-pentagon { clip-path: polygon(50% 0%, 100% 38%, 82% 100%, 18% 100%, 0% 38%); }        .shape-circle { clip-path: circle(50%); border-radius: 50%; }        .shape-point { clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%); }        /* FIXED: Added 'inset(0)' so square dice appear */        .shape-square { clip-path: inset(0 0 0 0); border-radius: 8px; }        .crit { color: #ffd700 !important; }        .fumble { color: #ff4d4d !important; }        .result-value { font-size: 4.5rem; font-weight: 900; color: #fff; text-shadow: 0 0 30px var(--accent-glow); }    </style></head><body>    <div class="card">        <h1>🎲 Dice Roller</h1>        <form method="POST">            <input type="text" name="roll" placeholder="2d20+5" value="{{ roll_query }}" autocomplete="off">            <button type="submit" name="action" value="roll">Execute Roll</button>            {% if rolls_list %}                <input type="hidden" name="current_total" value="{{ result }}">                {% for val in rolls_list %}<input type="hidden" name="current_rolls" value="{{ val }}">{% endfor %}                {% for die in dice_list %}<input type="hidden" name="current_dice" value="{{ die }}">{% endfor %}                <br>                <button type="submit" name="action" value="reroll" style="background: #f59e0b; color: white; margin-top: 10px;">Reroll Ones 🎲</button>            {% endif %}        </form>        <div class="dice-tray">            {% for i in range(rolls_list|length) %}                <span class="die-result                     {% if dice_list[i] in [4, 8, 20] %} shape-triangle                    {% elif dice_list[i] == 12 %} shape-pentagon                    {% elif dice_list[i] in [2, 100] %} shape-circle                    {% elif dice_list[i] == 10 %} shape-point                    {% else %} shape-square {% endif %}                    {% if rolls_list[i] == dice_list[i] %} crit                    {% elif rolls_list[i] == 1 %} fumble {% endif %}"                    data-final="{{ rolls_list[i] }}" data-sides="{{ dice_list[i] }}">                    <span class="tumble-val">0</span>                </span>            {% endfor %}        </div>        {% if result is not none %}            <div class="result-value">{{ result }}</div>        {% endif %}    </div>    <script>        document.querySelectorAll('.die-result').forEach(die => {            const display = die.querySelector('.tumble-val');            const final = parseInt(die.getAttribute('data-final'));            const sides = parseInt(die.getAttribute('data-sides'));            let count = 0;            const interval = setInterval(() => {                display.innerText = Math.floor(Math.random() * (sides || 20)) + 1;                if (++count > 15) {                    clearInterval(interval);                    display.innerText = final;                }            }, 50);        });    </script></body></html>
